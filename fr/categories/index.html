<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">

    <meta name="description" content="Pulattech - Minimalist, high-performance apps built for visual and functional excellence.">

</head>

<body>
<header>
  <div class="nav-container">
    <a href="/fr/" class="logo">Pulattech</a>
    <div class="nav-links">
      <div class="lang-dropdown">
        <button class="lang-dropdown-btn" onclick="toggleDropdown(event)">
          🇫🇷 Français
          <span class="dropdown-arrow">▼</span>
        </button>
        <div class="lang-dropdown-content" id="langDropdown">
          
            <a href="/categories/" class="">
              🇺🇸 English
            </a>
          
            <a href="/tr/categories/" class="">
              🇹🇷 Türkçe
            </a>
          
            <a href="/fr/categories/" class="active">
              🇫🇷 Français
            </a>
          
            <a href="/de/categories/" class="">
              🇩🇪 Deutsch
            </a>
          
        </div>
      </div>
    </div>
  </div>
</header>

<script>
function toggleDropdown(event) {
  event.stopPropagation();
  const dropdown = document.getElementById('langDropdown');
  dropdown.classList.toggle('show');
  
  const btn = event.currentTarget;
  btn.classList.toggle('active-btn');
}


window.addEventListener('click', function(event) {
  const dropdown = document.getElementById('langDropdown');
  const btn = document.querySelector('.lang-dropdown-btn');
  if (dropdown && dropdown.classList.contains('show')) {
    if (!dropdown.contains(event.target) && !btn.contains(event.target)) {
      dropdown.classList.remove('show');
      btn.classList.remove('active-btn');
    }
  }
});
</script>


<main class="container">
  <article class="privacy-container prose">
    <h1>Categories</h1>
